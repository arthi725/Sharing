<!DOCTYPE html>
<html>
<head>
    <title>Ride Sharing Application</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .container {
            width: 320px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: green;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            color: blue;
        }
    </style>

</head>

<body>

<h1>Ride Sharing Application</h1>

<div class="container">

    <label>Name:</label>
    <input type="text" id="name" placeholder="Enter your name">

    <label>Pickup Location:</label>
    <input type="text" id="pickup" placeholder="Enter pickup location">

    <label>Drop Location:</label>
    <input type="text" id="drop" placeholder="Enter drop location">

    <label>Distance (km):</label>
    <input type="number" id="distance" placeholder="Enter distance">

    <label>Vehicle Type:</label>
    <select id="vehicle">
        <option value="Bike">Bike</option>
        <option value="Auto">Auto</option>
        <option value="Car">Car</option>
    </select>

    <button onclick="bookRide()">
        Book Ride
    </button>

    <p id="result"></p>

</div>

<script>

function bookRide() {

    var name = document.getElementById("name").value;
    var pickup = document.getElementById("pickup").value;
    var drop = document.getElementById("drop").value;
    var distance = document.getElementById("distance").value;
    var vehicle = document.getElementById("vehicle").value;

    var rate;
    var fare;

    if (vehicle == "Bike") {
        rate = 10;
    }
    else if (vehicle == "Auto") {
        rate = 15;
    }
    else {
        rate = 20;
    }

    fare = distance * rate;

    if (name == "" || pickup == "" || drop == "" || distance == "") {
        document.getElementById("result").innerHTML =
        "Please fill all fields!";
        return;
    }

    document.getElementById("result").innerHTML =
        "Ride Booked Successfully! <br><br>" +
        "Name: " + name + "<br>" +
        "Pickup: " + pickup + "<br>" +
        "Drop: " + drop + "<br>" +
        "Vehicle: " + vehicle + "<br>" +
        "Distance: " + distance + " km<br>" +
        "Total Fare: ₹" + fare;

}

</script>

</body>
</html>
